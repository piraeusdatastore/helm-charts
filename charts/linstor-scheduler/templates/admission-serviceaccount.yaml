{{- if and .Values.admission.enabled .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "linstor-scheduler.admissionServiceAccountName" . }}
  labels:
    {{- include "linstor-scheduler.admissionLabels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
