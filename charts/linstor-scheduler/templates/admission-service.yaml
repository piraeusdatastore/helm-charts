{{- if .Values.admission.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "linstor-scheduler.admissionFullname" . }}
  labels:
    {{- include "linstor-scheduler.admissionLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: 8080
      protocol: TCP
      name: https
  selector:
    {{- include "linstor-scheduler.admissionSelectorLabels" . | nindent 4 }}
{{- end }}
